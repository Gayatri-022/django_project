{% extends 'store/base.html' %}

{% block content %}

<h1 style="text-align:center;">✏️ Edit Profile</h1>

<form method="POST" style="width:350px; margin:auto; padding:20px; border:1px solid #ccc; border-radius:10px; background:white;">
    {% csrf_token %}

    <input type="text" value="{{ user.username }}" readonly 
           style="width:100%; padding:10px; margin:10px 0; background:#f5f5f5;">

    <input type="email" value="{{ user.email }}" readonly 
           style="width:100%; padding:10px; margin:10px 0; background:#f5f5f5;">

    <input type="text" name="phone" value="{{ profile.phone }}" placeholder="Phone"
           style="width:100%; padding:10px; margin:10px 0;">

    <textarea name="address" placeholder="Address"
              style="width:100%; padding:10px; margin:10px 0;">{{ profile.address }}</textarea>

    <button type="submit" style="padding:10px; width:100%; background:black; color:white;">
        Save Changes 💾
    </button>

</form>

{% endblock %}
