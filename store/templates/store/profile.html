{% extends 'store/base.html' %}

{% block content %}

<h1 style="text-align:center;">👤 My Profile</h1>

<div style="width:350px; margin:auto; padding:20px; border:1px solid #ccc; border-radius:10px; background:white;">

    <p><b>Username:</b> {{ user.username }}</p>
    <p><b>Email:</b> {{ user.email }}</p>

    <p><b>Phone:</b> {{ profile.phone }}</p>
    <p><b>Address:</b> {{ profile.address }}</p>

    <br>

    <a href="/edit-profile/">
        <button style="padding:10px; width:100%;">Edit Profile ✏️</button>
    </a>

</div>

{% endblock %}
