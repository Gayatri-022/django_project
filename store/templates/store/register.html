{% extends 'store/base.html' %}

{% block content %}

<style>

/* GLOBAL FIX */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: linear-gradient(135deg, #fdfaf4, #f7efe5);
    font-family: 'Segoe UI', sans-serif;
}

/* CONTAINER */
.auth-container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 50px 20px;
}

/* CARD */
.auth-box {
    width: 100%;
    max-width: 500px; /* bigger */
    padding: 50px;
    border-radius: 20px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(14px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    margin: 0 auto;
}

/* LOGO */
.logo-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    margin-bottom: 30px;
}

.logo-circle {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid #3d141a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #3d141a;
}

.logo-text {
    font-size: 26px;
    letter-spacing: 6px;
    font-weight: 700;
    color: #3d141a;
}

/* TITLE */
.auth-box h2 {
    text-align: center;
    margin-bottom: 6px;
    font-size: 26px;
    color: #3d141a;
}

.subtitle {
    text-align: center;
    font-size: 15px;
    color: #777;
    margin-bottom: 30px;
}

/* INPUT */
.input-group {
    margin-bottom: 18px;
    width: 100%;
}

.input-group input,
.input-group textarea {
    width: 100%;
    display: block;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid #ddd;
    font-size: 15px;
    background: #fff;
}

.input-group input:focus,
.input-group textarea:focus {
    border-color: #3d141a;
    outline: none;
    box-shadow: 0 0 0 3px rgba(61,20,26,0.08);
}

/* GRID FIX (CITY + PINCODE) */
.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

/* PASSWORD */
.password-wrapper {
    position: relative;
}

.toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 12px;
}

/* BUTTONS */
.auth-btn {
    width: 100%;
    padding: 15px;
    font-size: 15px;
    background: linear-gradient(135deg, #3d141a, #5a1d25);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

.next-btn, .prev-btn {
    width: 100%;
    padding: 14px;
    font-size: 14px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.next-btn {
    background: #3d141a;
    color: white;
}

.prev-btn {
    background: #eee;
}

/* FORM STEPS */
.form-step {
    display: none;
}

.form-step.active {
    display: block;
}

/* PROGRESS */
.progress-bar {
    width: 100%;
    height: 6px;
    background: #eee;
    border-radius: 10px;
    margin-bottom: 25px;
}

.progress {
    height: 100%;
    width: 33%;
    background: linear-gradient(135deg, #3d141a, #5a1d25);
    transition: 0.3s;
}

/* MESSAGES */
.error-box {
    background: #ffe5e5;
    color: #a10000;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 15px;
}

.success-box {
    background: #e6ffe6;
    color: #006600;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 15px;
}

/* BOTTOM */
.bottom-text {
    text-align: center;
    margin-top: 20px;
}

.bottom-text a {
    color: #3d141a;
    font-weight: bold;
    text-decoration: none;
}

.input-error {
    border-color: red !important;
    box-shadow: 0 0 0 2px rgba(255,0,0,0.1);
}


#toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 99999;

    display: flex;
    flex-direction: column;
    gap: 12px;

    pointer-events: none;
}


@keyframes toastIn {
    from { right: -100%; opacity: 0; }
    to { right: 25px; opacity: 1; }
}

@keyframes toastOut {
    from { right: 25px; opacity: 1; }
    to { right: -100%; opacity: 0; }
}



/* MOBILE */
@media (max-width: 500px) {
    .form-row {
        grid-template-columns: 1fr;
    }
}


@media (max-width: 600px) {
    #toast-container {
        right: 15px;
    }
}

</style>

<div class="auth-container">
<div class="auth-box">

<!-- LOGO -->
<div class="logo-wrap">
    <div class="logo-circle">S</div>
    <div class="logo-text">SHOPPERS</div>
</div>

<h2>Create Account</h2>
<p class="subtitle">Join Shoppers and start shopping</p>

<!-- MESSAGES -->
{% if messages %}
    {% for message in messages %}
        <div class="{% if message.tags == 'error' %}error-box{% else %}success-box{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="progress-bar">
    <div class="progress"></div>
</div>

<!-- STEP 1 -->
<div class="form-step active">
    <div class="input-group">
        <input type="text" name="username" placeholder="Username" required>
    </div>
    <div class="input-group">
        <input type="email" name="email" placeholder="Email" required>
    </div>
    <div class="input-group">
        <input type="text" name="full_name" placeholder="Full Name" required>
    </div>
    <div class="input-group">
        <input type="text" name="phone" placeholder="Mobile Number" required>
    </div>
    <button type="button" class="next-btn">Next</button>
</div>

<!-- STEP 2 -->
<div class="form-step">
    <div class="input-group">
        <textarea name="address_line" placeholder="Address" rows="3" required></textarea>
    </div>

    <div class="form-row">
        <div class="input-group">
            <input type="text" name="city" placeholder="City" required>
        </div>
        <div class="input-group">
            <input type="text" name="pincode" placeholder="Pincode" required>
        </div>
    </div>

    <div class="input-group">
        <input type="text" name="state" placeholder="State" required>
    </div>

    <div style="display:flex; gap:10px;">
        <button type="button" class="prev-btn">Back</button>
        <button type="button" class="next-btn">Next</button>
    </div>
</div>

<!-- STEP 3 -->
<div class="form-step">
    <div class="input-group password-wrapper">
        <input type="password" name="password" id="password" placeholder="Password" required>
        <span class="toggle" onclick="togglePassword('password')">Show</span>
    </div>

    <div class="input-group password-wrapper">
        <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>
        <span class="toggle" onclick="togglePassword('confirm_password')">Show</span>
    </div>

    <div style="display:flex; gap:10px;">
        <button type="button" class="prev-btn">Back</button>
        <button type="submit" class="auth-btn">Create Account</button>
    </div>
</div>

</form>



<div class="bottom-text">
    Already have an account? 
    <a href="{% url 'login' %}">Login</a>
</div>

</div>
</div>



<script>
let steps = document.querySelectorAll(".form-step");
let nextBtns = document.querySelectorAll(".next-btn");
let prevBtns = document.querySelectorAll(".prev-btn");
let progress = document.querySelector(".progress");

let current = 0;

/* VALIDATION FUNCTION */
function validateStep(step) {
    let inputs = step.querySelectorAll("input, textarea");
    let isValid = true;

    inputs.forEach(input => {
        input.classList.remove("input-error");

        if (!input.value.trim()) {
            input.classList.add("input-error");
            isValid = false;
        }
    });

    return isValid;
}

function updateSteps() {
    steps.forEach((step, i) => {
        step.classList.toggle("active", i === current);
    });

    progress.style.width = ((current + 1) / steps.length) * 100 + "%";
}

/* NEXT BUTTON */
nextBtns.forEach(btn => {
    btn.addEventListener("click", () => {
        let currentStep = steps[current];

        if (!validateStep(currentStep)) {
            showToast("error", "Missing Fields", "Please fill all required fields before continuing");
            return; // 🚫 stop if invalid
        }

        if (current < steps.length - 1) {
            current++;
            updateSteps();
        }
    });
});

/* BACK BUTTON */
prevBtns.forEach(btn => {
    btn.addEventListener("click", () => {
        if (current > 0) {
            current--;
            updateSteps();
        }
    });
});

/* PASSWORD TOGGLE */
function togglePassword(id) {
    let field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

updateSteps();


function showToast(type, title, message) {
    const container = document.getElementById("toast-container");
    const toast = document.createElement("div");

    const colors = {
        success: { bg: '#f0faf3', border: '#22c55e', icon: '✓' },
        info:    { bg: '#f0f7ff', border: '#3b82f6', icon: 'i' },
        error:   { bg: '#fff5f5', border: '#ef4444', icon: '!' }
    };

    const theme = colors[type];

    Object.assign(toast.style, {
        width: '320px',
        background: `linear-gradient(to right, ${theme.bg}, #ffffff)`,
        border: `1px solid ${theme.border}`,
        borderRadius: '15px',
        padding: '18px',
        display: 'flex',
        alignItems: 'center',
        gap: '15px',
        boxShadow: '0 10px 30px rgba(0,0,0,0.1)',
        pointerEvents: 'auto',
        animation: 'toastIn 0.5s ease forwards'
    });

    toast.innerHTML = `
        <div style="width:36px; height:36px; border:2px solid ${theme.border}; color:${theme.border}; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">
            ${theme.icon}
        </div>
        <div>
            <p style="margin:0; font-weight:bold;">${title}</p>
            <p style="margin:2px 0 0; font-size:13px;">${message}</p>
        </div>
    `;

    container.appendChild(toast);

    setTimeout(() => {
        toast.style.animation = "toastOut 0.5s ease forwards";
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}


</script>

<div id="toast-container"></div>

{% endblock %}
