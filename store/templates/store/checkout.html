{% extends 'store/base.html' %}

{% block content %}

<style>



body {
    background: linear-gradient(135deg, #fdfaf4, #f3e7e9);
    font-family: 'Segoe UI', sans-serif;
}

/* STEP BAR */
.steps {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 30px 0;
}

.step {
    font-size: 14px;
    color: #999;
}

.step.active {
    color: #3d141a;
    font-weight: bold;
}

/* LAYOUT */
.checkout-container {
    display: flex;
    gap: 30px;
    max-width: 1100px;
    margin: 60px auto;
}

/* GLASS CARD */
.glass {
    backdrop-filter: blur(14px);
    background: rgba(255,255,255,0.6);
    border-radius: 16px;
    padding: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
}

/* LEFT */
.left-box { flex: 2; }

/* RIGHT */
.right-box { flex: 1; height: fit-content; }

/* TITLE */
.section-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 15px;
}

/* ADDRESS CARD */
.address-card {
    border: 1px solid rgba(0,0,0,0.08);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 12px;
    transition: 0.3s;
    cursor: pointer;
    position: relative;
}

.address-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.address-card:hover {
    border-color: #3d141a;
    transform: translateY(-2px);
}

.address-card input {
    margin-right: 10px;
}

.change-default-btn {
    margin-top: 10px;
    background: transparent;
    border: 1px solid #3d141a;
    color: #3d141a;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
    display: inline-block;
}

.change-default-btn:hover {
    background: #3d141a;
    color: white;
}


/* ADD BTN */
.add-btn {
    background: none;
    border: none;
    color: #3d141a;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
}

/* FORM */
.new-address input,
.new-address textarea {
    width: 100%;
    padding: 11px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

/* SUMMARY */
.summary-row {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
}

.total {
    font-size: 20px;
    font-weight: bold;
}

/* BUTTON */
.checkout-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #3d141a, #5a1d25);
    color: white;
    border: none;
    border-radius: 10px;
    margin-top: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.checkout-btn:hover {
    transform: scale(1.02);
}

/* BADGE */
.address-card .badge {
    position: absolute;
    top: 10px;
    right: 10px;

    font-size: 12px;          /* ↑ slightly bigger */
    font-weight: 400;         /* clearer text */
    padding: 6px 14px;        /* ↑ more breathing space */
    border-radius: 8px;

    background: #3d141a;
    color: white;
    letter-spacing: 0.3px;    /* improves readability */
}

</style>



<div class="checkout-container">

<form style="display:flex; width:100%; gap:30px;">
{% csrf_token %}

<!-- LEFT -->
<div class="left-box glass">

<div class="section-title">📍 Delivery Address</div>

{% for addr in addresses %}
<div class="address-card">
    <label>
        <input type="radio" name="address_id" value="{{ addr.id }}"
        {% if addr.id == default_address.id %}checked{% endif %}>

        <div class="address-header">
            <b>{{ addr.full_name }}</b>

            {% if addr.is_default %}
                <span class="badge">Default</span>
            {% endif %}
        </div>

        {{ addr.address_line }}<br>
        {{ addr.city }}, {{ addr.state }} - {{ addr.pincode }}<br>
        📞 {{ addr.phone }}

        {% if not addr.is_default %}
            <button type="button" 
                class="change-default-btn"
                onclick="setDefaultAddress('{{ addr.id }}')">
                Set as Default
            </button>
        {% endif %}
    </label>
</div>
{% endfor %}

<button type="button" class="add-btn" onclick="toggleNewAddress()">
    + Add New Address
</button>

<!-- NEW ADDRESS -->
<div id="newAddressForm" class="new-address" style="display:none;">

<input type="text" name="full_name" placeholder="Full Name">
<input type="text" name="phone" placeholder="Phone">
<textarea name="address_line" placeholder="Address"></textarea>

<div style="display:flex; gap:10px;">
<input type="text" name="city" placeholder="City">
<input type="text" name="state" placeholder="State">
</div>

<input type="text" name="pincode" placeholder="Pincode">

</div>

</div>

<!-- RIGHT -->
<div class="right-box glass">

<div class="section-title">🧾 Order Summary</div>

<div id="itemsList"></div>

<hr>

<div class="summary-row">
    <span>Subtotal</span>
    <span id="subtotal"></span>
</div>

<div class="summary-row">
    <span>Shipping</span>
    <span style="color:green;">Free</span>
</div>

<div class="summary-row total">
    <span>Total</span>
    <span id="total"></span>
</div>

<input type="hidden" name="total" id="totalInput">
<input type="hidden" name="cart" id="cartInput">

<h3 style="margin-top:20px;">💳 Payment Method</h3>

<div style="margin-top:10px;">
    <label>
        <input type="radio" name="payment_method" value="cod" checked>
        Cash on Delivery (COD)
    </label>
</div>


<button type="button" class="checkout-btn" id="checkoutBtn" onclick="goToPayment()">
    Place Order →
</button>

</div>

</form>

</div>


<script>

// CART
let buyNowItem = JSON.parse(localStorage.getItem("buy_now"));
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let finalItems = [];
let total = 0;

if(buyNowItem){
    finalItems = [buyNowItem];
    total = buyNowItem.price * (buyNowItem.quantity || 1);
} else {
    finalItems = cart;
    finalItems.forEach(item => {
        total += item.price * (item.quantity || 1);
    });
}

// ITEMS UI
let html = "";
finalItems.forEach(item => {
    html += `
    <div class="summary-row">
        <span>${item.name} x ${item.quantity || 1}</span>
        <span>₹${item.price * (item.quantity || 1)}</span>
    </div>`;
});

document.getElementById("itemsList").innerHTML = html;

// TOTAL
document.getElementById("subtotal").innerText = "₹" + total;
document.getElementById("total").innerText = "₹" + total;

document.getElementById("totalInput").value = total;
document.getElementById("cartInput").value = JSON.stringify(finalItems);

// CLEAR BUY NOW
localStorage.removeItem("buy_now");

// TOGGLE ADDRESS
function toggleNewAddress(){
    let form = document.getElementById("newAddressForm");
    form.style.display = form.style.display === "none" ? "block" : "none";

    if(form.style.display === "block"){
        document.querySelectorAll('input[name="address_id"]').forEach(el => el.checked = false);
    }
}


function setDefaultAddress(id){
    fetch(`/set-default-address/${id}/`)
    .then(res => res.json())
    .then(() => location.reload());
}

function goToPayment(){

    // 1. GET SELECTED ADDRESS
    let selectedAddress = document.querySelector('input[name="address_id"]:checked');

    let newAddressForm = document.getElementById("newAddressForm");

    let isNewAddressVisible = newAddressForm.style.display === "block";

    // 2. VALIDATION
    if(!selectedAddress && !isNewAddressVisible){
        alert("Please select or add an address");
        return;
    }

    // 3. COLLECT DATA
    let address_id = selectedAddress ? selectedAddress.value : "";

    let formData = new FormData();

    formData.append("address_id", address_id);
    formData.append("total", document.getElementById("totalInput").value);
    formData.append("cart", document.getElementById("cartInput").value);

    // new address fields (if any)
    if(isNewAddressVisible){

        formData.append("full_name", document.querySelector('input[name="full_name"]').value);
        formData.append("phone", document.querySelector('input[name="phone"]').value);
        formData.append("address_line", document.querySelector('textarea[name="address_line"]').value);
        formData.append("city", document.querySelector('input[name="city"]').value);
        formData.append("state", document.querySelector('input[name="state"]').value);
        formData.append("pincode", document.querySelector('input[name="pincode"]').value);
    }

    // 4. SEND TO BACKEND
    fetch("{% url 'checkout' %}", {
        method: "POST",
        headers: {
        "X-CSRFToken": "{{ csrf_token }}"
    },
    body: formData
})
.then(res => res.json())
.then(data => {

    if(data.error){
        alert(data.error);
        return;
    }

    let paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;

    if(paymentMethod === "cod"){
        window.location.href = data.redirect_url;
    }
    else{
        // future online payment
        window.location.href =
            "/payment/?total=" + data.total +
            "&address_id=" + data.address_id +
            "&cart=" + encodeURIComponent(data.cart);
    }

})
.catch(err => {
    console.error(err);
    alert("Something went wrong");
});
}


// CHANGE BUTTON TEXT BASED ON PAYMENT
let paymentRadios = document.querySelectorAll('input[name="payment_method"]');
let btn = document.getElementById("checkoutBtn");

paymentRadios.forEach(radio => {
    radio.addEventListener("change", () => {
        if(radio.value === "cod" && radio.checked){
            btn.innerText = "Place Order →";
        } else {
            btn.innerText = "Proceed to Payment →";
        }
    });
});

</script>


{% endblock %}
